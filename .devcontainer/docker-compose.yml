services:
  lunaroute:
    build:
      context: ./lunaroute
      dockerfile: ../Dockerfile.lunaroute
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./luna-route.config:/app/config.yaml:ro
    networks:
      - devnet
    command: ["--config", "/app/config.yaml"]
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached,z
      - ./continue-config/config.yaml:/home/vscode/.continue/config.yaml:ro,z
      - ./continue-config/.env:/home/vscode/.continue/.env:ro,z
    working_dir: /workspace
    networks:
      - devnet
    depends_on:
      - lunaroute
    environment:
      - OPENAI_BASE_URL=http://lunaroute:8081/v1
    command: sleep infinity
networks:
  devnet:
    driver: bridge
